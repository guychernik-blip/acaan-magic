<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון ACAAN</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #fake-notification {
            position: fixed;
            top: -100px;
            left: 5%;
            width: 90%;
            background-color: #2b2b2b;
            color: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            font-size: 20px;
            font-weight: bold;
            text-align: right;
            transition: top 0.4s ease-out;
            z-index: 1000;
            border-left: 5px solid #25D366;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
        }
        select, input, button {
            width: 100%;
            font-size: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
        }
        button {
            background-color: #0A84FF;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="fake-notification">--</div>

<div class="container">
    <label>קלף נבחר:</label>
    <select id="card-select"></select>

    <label>מספר נבחר (1-52):</label>
    <input type="number" id="target-number" placeholder="לדוגמה: 22">

    <button onclick="calculateAndNotify()">שגר חישוב</button>
</div>

<script>
const mnemonica = [
    "", "4 תלתן", "2 לב", "7 יהלום", "3 תלתן", "4 לב", "6 יהלום", "אס תלתן", "5 לב", "9 עלה", "2 עלה", "מלכה לב", "3 יהלום", "מלכה תלתן", "8 לב", "6 עלה", "5 עלה", "9 לב", "מלך תלתן", "2 יהלום", "נסיך לב", "3 עלה", "8 עלה", "6 לב", "10 תלתן", "5 יהלום", "מלך יהלום",
    "2 תלתן", "3 לב", "8 יהלום", "5 תלתן", "מלך עלה", "נסיך יהלום", "8 תלתן", "10 לב", "מלך יהלום", "נסיך תלתן", "7 עלה", "10 יהלום", "אס לב", "4 עלה", "7 לב", "4 יהלום", "אס תלתן", "9 תלתן", "נסיך עלה", "מלכה יהלום", "7 תלתן", "מלכה עלה", "10 עלה", "6 תלתן", "אס יהלום", "9 יהלום"
];

const selectEl = document.getElementById('card-select');
for (let i = 1; i <= 52; i++) {
    let option = document.createElement('option');
    option.value = i;
    option.textContent = mnemonica[i];
    selectEl.appendChild(option);
}

const iphoneSound = new Audio('https://www.myinstants.com/media/sounds/iphone-sms.mp3');

function calculateAndNotify() {
    const cardStackPos = parseInt(selectEl.value);
    const targetNum = parseInt(document.getElementById('target-number').value);

    if (isNaN(targetNum) || targetNum < 1 || targetNum > 52) {
        alert("חובה להכניס מספר בין 1 ל-52");
        return;
    }

    let cutAmount = (cardStackPos - targetNum + 52) % 52;
    let cutCardIndex = cutAmount === 0 ? 52 : cutAmount;
    let cutCardName = mnemonica[cutCardIndex];

    // טריק לשחרור החסימה של הסאונד - הפעלה ועצירה מיידית
    iphoneSound.play().then(() => {
        iphoneSound.pause();
        iphoneSound.currentTime = 0;
    }).catch(e => console.log("Init blocked by browser"));

    // השהיה של 3 שניות (3000 מילי-שניות) במקום 5
    setTimeout(() => {
        
        iphoneSound.play().catch(e => alert("ודא שהטלפון לא על מצב שקט."));

        const notification = document.getElementById('fake-notification');
        notification.innerText = "WhatsApp: " + cutAmount + " - " + cutCardName;
        notification.style.top = "20px";

        setTimeout(() => {
            notification.style.top = "-100px";
        }, 5000);
        
    }, 3000); 
}
</script>

</body>
</html>
